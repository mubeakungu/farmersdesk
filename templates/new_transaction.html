<!DOCTYPE html>
<html>
<head>
    <title>New Transaction - FarmersDeskLtd POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .navbar { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; cursor: pointer; }
        .container { padding: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        .item-list { margin-top: 20px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: end; background: #f9f9f9; padding: 10px; border-radius: 5px; }
        .item-row input { margin: 0; }
        .btn-remove { background: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; }
        .btn-remove:hover { background: #da190b; }
        .summary { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }
        .summary-row:last-child { border-bottom: none; }
        .summary-total { font-size: 20px; font-weight: bold; color: #667eea; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #4caf50; color: white; }
        .btn-add:hover { background: #45a049; }
        .btn-submit { background: #667eea; color: white; }
        .btn-submit:hover { background: #764ba2; }
        .btn-cancel { background: #999; color: white; text-decoration: none; text-align: center; }
        .btn-cancel:hover { background: #777; }
        .success { color: #4caf50; margin-top: 10px; padding: 10px; background: #f1f8f4; border-radius: 5px; display: none; }
        .error { color: #d32f2f; margin-top: 10px; padding: 10px; background: #ffebee; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🏪 FarmersDeskLtd POS</h1>
        <a href="/dashboard">← Back to Dashboard</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>+ New Transaction</h2>
            <form id="transactionForm">
                <h3 style="margin-top: 20px; margin-bottom: 15px;">Transaction Items</h3>
                
                <div id="itemsContainer"></div>
                
                <button type="button" class="btn btn-add" onclick="addItem()">+ Add Item</button>
                
                <div class="item-list">
                    <div id="itemsList"></div>
                </div>
                
                <div class="summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">0.00</span>
                    </div>
                    <div class="summary-row">
                        <span style="font-size: 18px; font-weight: bold;">TOTAL:</span>
                        <span class="summary-total" id="total">0.00</span>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-submit">✓ Complete Transaction</button>
                    <a href="/dashboard" class="btn btn-cancel">✕ Cancel</a>
                </div>
                
                <div class="success" id="successMsg">✓ Transaction recorded and receipt printed!</div>
                <div class="error" id="errorMsg"></div>
            </form>
        </div>
    </div>
    
    <script>
        let items = [];
        let itemCounter = 0;
        
        function addItem() {
            itemCounter++;
            const item = {
                id: itemCounter,
                description: '',
                quantity: 1,
                rate: 0
            };
            items.push(item);
            renderItems();
        }
        
        function renderItems() {
            const container = document.getElementById('itemsList');
            container.innerHTML = '';
            
            items.forEach((item, index) => {
                const html = `
                    <div class="item-row">
                        <input type="text" placeholder="Item Description" value="${item.description}" 
                               onchange="updateItem(${index}, 'description', this.value)">
                        <input type="number" placeholder="Qty" value="${item.quantity}" step="0.01" min="0"
                               onchange="updateItem(${index}, 'quantity', parseFloat(this.value))">
                        <input type="number" placeholder="Rate" value="${item.rate}" step="0.01" min="0"
                               onchange="updateItem(${index}, 'rate', parseFloat(this.value))">
                        <input type="number" readonly value="${(item.quantity * item.rate).toFixed(2)}" style="background: #eee;">
                        <button type="button" class="btn-remove" onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
                container.innerHTML += html;
            });
            
            calculateTotal();
        }
        
        function updateItem(index, field, value) {
            items[index][field] = value;
            renderItems();
        }
        
        function removeItem(index) {
            items.splice(index, 1);
            renderItems();
        }
        
        function calculateTotal() {
            const total = items.reduce((sum, item) => sum + (item.quantity * item.rate), 0);
            document.getElementById('subtotal').textContent = total.toFixed(2);
            document.getElementById('total').textContent = total.toFixed(2);
        }
        
        // Add first item on load
        window.onload = function() {
            addItem();
        };
        
        // Form submission
        document.getElementById('transactionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (items.length === 0) {
                alert('Please add at least one item');
                return;
            }
            
            const total = items.reduce((sum, item) => sum + (item.quantity * item.rate), 0);
            
            const data = {
                items: items,
                total: total
            };
            
            try {
                const response = await fetch('/new-transaction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    document.getElementById('errorMsg').textContent = result.error;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Error: ' + error;
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
